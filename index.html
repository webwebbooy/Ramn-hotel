<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Raman Restaurant | Lal Ganj</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #1a0f0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2c1810 0%, #1a0f0a 60%, #0d0705 100%);
            z-index: 0;
        }

        /* Floating Particles (like warm lights) */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #D4A847;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-20vh) scale(1);
            }
        }

        /* Main Container */
        .intro-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }

        /* Plate Morphing Animation */
        .plate-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plate {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
            border: 8px solid #D4A847;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 -10px 30px rgba(0,0,0,0.1),
                inset 0 10px 30px rgba(255,255,255,0.3);
            position: relative;
            animation: plateAppear 1.5s ease-out forwards, plateGlow 3s ease-in-out infinite 1.5s;
            opacity: 0;
            transform: scale(0.5) rotateX(45deg);
        }

        @keyframes plateAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotateX(45deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateX(0deg);
            }
        }

        @keyframes plateGlow {
            0%, 100% {
                box-shadow: 
                    0 20px 60px rgba(0,0,0,0.5),
                    inset 0 -10px 30px rgba(0,0,0,0.1),
                    inset 0 10px 30px rgba(255,255,255,0.3),
                    0 0 30px rgba(212, 168, 71, 0.3);
            }
            50% {
                box-shadow: 
                    0 20px 60px rgba(0,0,0,0.5),
                    inset 0 -10px 30px rgba(0,0,0,0.1),
                    inset 0 10px 30px rgba(255,255,255,0.3),
                    0 0 50px rgba(212, 168, 71, 0.6);
            }
        }

        /* Food Icon Morphing */
        .food-morph {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            opacity: 0;
            animation: foodMorph 6s ease-in-out infinite;
            animation-delay: 1.8s;
        }

        @keyframes foodMorph {
            0%, 100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5) rotate(-10deg);
            }
            5% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1) rotate(5deg);
            }
            25% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8) rotate(-5deg);
            }
            30%, 100% {
                opacity: 0;
            }
        }

        .food-morph:nth-child(2) { animation-delay: 2.8s; }
        .food-morph:nth-child(3) { animation-delay: 3.8s; }
        .food-morph:nth-child(4) { animation-delay: 4.8s; }
        .food-morph:nth-child(5) { animation-delay: 5.8s; }

        /* Restaurant Name */
        .restaurant-name {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            color: #D4A847;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(30px);
            animation: nameReveal 1.2s ease-out forwards;
            animation-delay: 0.8s;
        }

        @keyframes nameReveal {
            0% {
                opacity: 0;
                transform: translateY(30px);
                letter-spacing: 20px;
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 4px;
            }
        }

        .restaurant-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            color: #E8913A;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0;
            animation: subtitleReveal 1s ease-out forwards;
            animation-delay: 1.5s;
        }

        @keyframes subtitleReveal {
            0% {
                opacity: 0;
                letter-spacing: 20px;
            }
            100% {
                opacity: 1;
                letter-spacing: 8px;
            }
        }

        .tagline {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            color: #FFF8E7;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 2s;
            margin-bottom: 40px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 0.8; }
        }

        /* Enter Button */
        .enter-btn {
            display: inline-block;
            padding: 16px 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #1a0f0a;
            background: linear-gradient(135deg, #D4A847, #E8913A);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(212, 168, 71, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: btnReveal 1s ease-out forwards;
            animation-delay: 2.5s;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .enter-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 168, 71, 0.6);
        }

        @keyframes btnReveal {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Steam Effect */
        .steam-container {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            opacity: 0;
            animation: steamAppear 1s ease-out forwards;
            animation-delay: 2s;
        }

        @keyframes steamAppear {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .steam {
            position: absolute;
            width: 8px;
            height: 30px;
            background: linear-gradient(to top, rgba(255,255,255,0.1), rgba(255,255,255,0.4), transparent);
            border-radius: 50%;
            animation: steamRise 2s ease-out infinite;
        }

        .steam:nth-child(1) { left: 20%; animation-delay: 0s; }
        .steam:nth-child(2) { left: 50%; animation-delay: 0.5s; }
        .steam:nth-child(3) { left: 80%; animation-delay: 1s; }

        @keyframes steamRise {
            0% {
                opacity: 0;
                transform: translateY(0) scaleX(1);
            }
            50% {
                opacity: 0.6;
                transform: translateY(-20px) scaleX(1.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scaleX(2);
            }
        }

        /* Location Badge */
        .location-badge {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #D4A847;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 3s;
        }

        .location-badge::before {
            content: '📍 ';
        }

        /* Responsive */
        @media (max-width: 768px) {
            .restaurant-name {
                font-size: 42px;
            }
            .restaurant-subtitle {
                font-size: 14px;
                letter-spacing: 5px;
            }
            .plate-container {
                width: 150px;
                height: 150px;
            }
            .plate {
                width: 140px;
                height: 140px;
            }
            .food-morph {
                font-size: 50px;
            }
            .tagline {
                font-size: 14px;
                padding: 0 20px;
            }
        }

        @media (max-width: 480px) {
            .restaurant-name {
                font-size: 32px;
            }
            .restaurant-subtitle {
                font-size: 12px;
                letter-spacing: 4px;
            }
            .enter-btn {
                padding: 14px 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg"></div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="intro-container">
        
        <!-- Plate with Morphing Food -->
        <div class="plate-container">
            <div class="plate">
                <!-- Steam Effect -->
                <div class="steam-container">
                    <div class="steam"></div>
                    <div class="steam"></div>
                    <div class="steam"></div>
                </div>
            </div>
            <!-- Morphing Food Icons -->
            <span class="food-morph">🍗</span>
            <span class="food-morph">🍛</span>
            <span class="food-morph">🍖</span>
            <span class="food-morph">🥘</span>
            <span class="food-morph">🍲</span>
        </div>

        <!-- Restaurant Name -->
        <h1 class="restaurant-name">Raman</h1>
        <p class="restaurant-subtitle">Restaurant</p>
        <p class="tagline">Where Every Meal Becomes a Memory</p>

        <!-- Enter Button -->
        <a href="home.html" class="enter-btn">Explore Menu</a>

    </div>

    <!-- Location Badge -->
    <div class="location-badge">LAL GANJ</div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                
                // Random warm colors
                const colors = ['#D4A847', '#E8913A', '#FFD700', '#FFA500'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.width = (2 + Math.random() * 4) + 'px';
                particle.style.height = particle.style.width;
                
                container.appendChild(particle);
            }
        }

        // Initialize
        window.addEventListener('load', function() {
            createParticles();
        });

        // Optional: Auto-redirect after 7 seconds
        // setTimeout(function() {
        //     window.location.href = 'home.html';
        // }, 7000);
    </script>

</body>
</html>
